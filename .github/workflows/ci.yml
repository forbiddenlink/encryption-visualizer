name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false
      - run: cd encryption-visualizer && pnpm install
      - run: cd encryption-visualizer && pnpm run build
